<body><article class="example example-like"> Using the figure at the top of the page, let's set up the definite integral:<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{gather*}
L = \int_a^b\sqrt{1 + f'(x)^2}dx\\
L = \int_1^3\sqrt{1 + (cos(x))^2}dx\\
L = \int_1^3\sqrt{1 + cos^2(x)}dx
\end{gather*}
